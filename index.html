<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini API Explorer V2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #030712;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --primary-glow: #3b82f6;
            --accent-glow: #8b5cf6;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --success: #10b981;
            --badge-bg: rgba(59, 130, 246, 0.1);
            --badge-text: #60a5fa;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Animated Background */
        .ambient-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
            animation: pulseLight 10s ease-in-out infinite alternate;
        }

        @keyframes pulseLight {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.1); }
        }

        .container {
            width: 90%;
            max-width: 1000px;
            padding: 4rem 1rem;
            z-index: 1;
        }

        /* Header Styling */
        header {
            text-align: center;
            margin-bottom: 3.5rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            text-shadow: 0 0 30px rgba(255,255,255,0.1);
        }

        p.subtitle {
            color: var(--text-muted);
            margin-top: 1rem;
            font-size: 1.1rem;
            font-weight: 300;
        }

        /* Input Area (Glassmorphism) */
        .search-box {
            position: relative;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 0.5rem;
            border-radius: 16px;
            display: flex;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            max-width: 700px;
            margin: 0 auto 3rem auto;
        }

        .search-box:focus-within {
            border-color: var(--dynamic-glow, rgba(59, 130, 246, 0.5));
            box-shadow: 0 0 30px -5px var(--dynamic-shadow, rgba(59, 130, 246, 0.3));
            transform: translateY(-2px);
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            flex: 1;
            padding: 0 1rem;
        }

        .provider-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.4);
            transition: all 0.3s ease;
        }

        .provider-icon svg { width: 100%; height: 100%; }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.1rem;
            padding: 1rem 1rem;
            outline: none;
            font-family: 'JetBrains Mono', monospace;
        }

        input::placeholder { color: rgba(255,255,255,0.3); }

        button#fetchBtn {
            background: var(--btn-gradient, linear-gradient(135deg, var(--primary-glow), var(--accent-glow)));
            color: white;
            border: none;
            padding: 0 2.5rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            white-space: nowrap;
        }

        button#fetchBtn:hover {
            opacity: 0.9;
            box-shadow: 0 0 20px var(--dynamic-shadow, rgba(139, 92, 246, 0.4));
        }

        .detected-label {
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .detected-label.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
        }

        /* Card Styling */
        .card {
            background: rgba(20, 20, 30, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.5s ease-out forwards;
            opacity: 0;
            display: flex;
            flex-direction: column;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 100%);
            pointer-events: none;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(30, 30, 45, 0.8);
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        /* Card Content */
        .card-header {
            margin-bottom: 1rem;
        }

        .model-display-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .model-id-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .model-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--primary-glow);
        }

        .copy-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px;
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }
        
        .copy-btn:hover { color: white; }
        .copy-btn svg { width: 14px; height: 14px; }

        .desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        /* New Use Case Badges */
        .use-case-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }

        .badge {
            font-size: 0.75rem;
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        /* Badge Color Variations */
        .badge-flash { background: rgba(234, 179, 8, 0.15); color: #facc15; border: 1px solid rgba(234, 179, 8, 0.2); }
        .badge-pro { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.2); }
        .badge-vision { background: rgba(168, 85, 247, 0.15); color: #c084fc; border: 1px solid rgba(168, 85, 247, 0.2); }
        .badge-embed { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }
        .badge-default { background: rgba(148, 163, 184, 0.15); color: #cbd5e1; border: 1px solid rgba(148, 163, 184, 0.2); }

        /* Stats Row */
        .stats {
            display: flex;
            gap: 1rem;
            border-top: 1px solid var(--glass-border);
            padding-top: 1rem;
            margin-top: auto;
        }

        .stat-item {
            font-size: 0.75rem;
            color: var(--text-muted);
            flex: 1;
        }

        .stat-item strong {
            display: block;
            color: #fff;
            font-size: 0.9rem;
            margin-bottom: 2px;
        }

        /* Status Messages */
        #status {
            text-align: center;
            margin-bottom: 2rem;
            font-weight: 500;
            height: 24px;
        }
        .error { color: #ef4444; text-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }
        .success { color: var(--success); text-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }

        /* Loader */
        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
            margin: 0 auto;
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

    </style>
</head>
<body>

    <div class="ambient-light"></div>

    <div class="container">
        <header>
            <h1>AI API Explorer</h1>
            <p class="subtitle">Enter your API key to auto-detect your provider and analyze available models.</p>
        </header>

        <div class="search-box" id="searchBox">
            <div class="input-wrapper">
                <div class="provider-icon" id="providerIcon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </div>
                <input type="password" id="apiKey" placeholder="Paste your API key here..." autocomplete="off">
            </div>
            <button id="fetchBtn">
                <span id="btnText">Detect & Analyze</span>
                <div class="loader" id="loader"></div>
            </button>
            <div class="detected-label" id="detectedLabel"></div>
        </div>

        <div id="status"></div>
        <div class="grid" id="grid"></div>
    </div>

    <script>
        const fetchBtn = document.getElementById('fetchBtn');
        const apiKeyInput = document.getElementById('apiKey');
        const grid = document.getElementById('grid');
        const statusDiv = document.getElementById('status');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');
        const searchBox = document.getElementById('searchBox');
        const detectedLabel = document.getElementById('detectedLabel');
        const providerIcon = document.getElementById('providerIcon');

        // SVG Icons mapping
        const ICONS = {
            lock: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>`,
            check: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`
        };

        // UI Brand Colors mapped to providers
        const BRAND_COLORS = {
            'Anthropic': { glow: 'rgba(217, 119, 87, 0.5)', shadow: 'rgba(217, 119, 87, 0.3)', btn: 'linear-gradient(135deg, #d97757, #9b543c)' },
            'OpenAI': { glow: 'rgba(16, 163, 127, 0.5)', shadow: 'rgba(16, 163, 127, 0.3)', btn: 'linear-gradient(135deg, #10a37f, #0d8a6b)' },
            'Google Gemini': { glow: 'rgba(66, 133, 244, 0.5)', shadow: 'rgba(66, 133, 244, 0.3)', btn: 'linear-gradient(135deg, #4285F4, #8b5cf6)' },
            'Groq': { glow: 'rgba(245, 80, 54, 0.5)', shadow: 'rgba(245, 80, 54, 0.3)', btn: 'linear-gradient(135deg, #f55036, #c23c28)' },
            'Mistral': { glow: 'rgba(249, 115, 22, 0.5)', shadow: 'rgba(249, 115, 22, 0.3)', btn: 'linear-gradient(135deg, #f97316, #ea580c)' },
            'Cohere': { glow: 'rgba(59, 130, 246, 0.5)', shadow: 'rgba(59, 130, 246, 0.3)', btn: 'linear-gradient(135deg, #3b82f6, #2563eb)' },
            'OpenRouter': { glow: 'rgba(139, 92, 246, 0.5)', shadow: 'rgba(139, 92, 246, 0.3)', btn: 'linear-gradient(135deg, #8b5cf6, #7c3aed)' }
        };

        function detectProvider(key) {
            if (!key) return null;
            if (key.startsWith('sk-ant-')) return { name: 'Anthropic', config: { url: 'https://api.anthropic.com/v1/models', headers: { 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' } } };
            if (key.startsWith('AIza')) return { name: 'Google Gemini', config: { url: `https://generativelanguage.googleapis.com/v1beta/models?key=${key}&pageSize=100`, headers: {} } };
            if (key.startsWith('gsk_')) return { name: 'Groq', config: { url: 'https://api.groq.com/openai/v1/models', headers: { 'Authorization': `Bearer ${key}` } } };
            if (key.startsWith('sk-proj-') || (key.startsWith('sk-') && key.length > 40 && !key.includes('or-'))) return { name: 'OpenAI', config: { url: 'https://api.openai.com/v1/models', headers: { 'Authorization': `Bearer ${key}` } } };
            if (key.startsWith('sk-or-v1-')) return { name: 'OpenRouter', config: { url: 'https://openrouter.ai/api/v1/models', headers: { 'Authorization': `Bearer ${key}` } } };
            if (key.length === 32 && /^[a-zA-Z0-9]+$/.test(key)) return { name: 'Mistral', config: { url: 'https://api.mistral.ai/v1/models', headers: { 'Authorization': `Bearer ${key}` } } };
            if (key.length === 40 && /^[a-zA-Z0-9]+$/.test(key)) return { name: 'Cohere', config: { url: 'https://api.cohere.ai/v1/models', headers: { 'Authorization': `Bearer ${key}` } } };
            return null;
        }

        // Real-time UI updates
        apiKeyInput.addEventListener('input', (e) => {
            const key = e.target.value.trim();
            const providerInfo = detectProvider(key);

            if (providerInfo) {
                const colors = BRAND_COLORS[providerInfo.name] || { glow: 'rgba(59, 130, 246, 0.5)', shadow: 'rgba(59, 130, 246, 0.3)', btn: 'linear-gradient(135deg, #3b82f6, #8b5cf6)' };

                // Update styling
                searchBox.style.setProperty('--dynamic-glow', colors.glow);
                searchBox.style.setProperty('--dynamic-shadow', colors.shadow);
                fetchBtn.style.setProperty('--btn-gradient', colors.btn);

                // Update Icon and Label
                providerIcon.innerHTML = ICONS.check;
                providerIcon.style.color = colors.glow.replace('0.5', '1');

                detectedLabel.innerHTML = `✨ Auto-detected: <strong>${providerInfo.name}</strong>`;
                detectedLabel.classList.add('visible');
            } else {
                // Reset styling
                searchBox.style.removeProperty('--dynamic-glow');
                searchBox.style.removeProperty('--dynamic-shadow');
                fetchBtn.style.removeProperty('--btn-gradient');

                providerIcon.innerHTML = ICONS.lock;
                providerIcon.style.color = 'rgba(255,255,255,0.4)';

                detectedLabel.classList.remove('visible');
            }
        });

        // Trigger on Enter
        apiKeyInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                fetchBtn.click();
            }
        });

        fetchBtn.addEventListener('click', async () => {
            const key = apiKeyInput.value.trim();

            if (!key) {
                setStatus('Please paste an API key first.', 'error');
                shakeInput();
                return;
            }

            const providerInfo = detectProvider(key);

            if (!providerInfo) {
                setStatus('Could not safely auto-detect provider from key format. Please ensure key is correct.', 'error');
                shakeInput();
                return;
            }

            const { name: detectedProviderName, config } = providerInfo;

            setLoading(true);
            grid.innerHTML = '';
            setStatus(`Testing detected provider: ${detectedProviderName}...`);

            try {
                const res = await fetch(config.url, { headers: config.headers });

                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData.error?.message || errData.message || errData.detail || `HTTP Error ${res.status} from ${detectedProviderName}. Key might be invalid or CORS blocked.`);
                }

                const data = await res.json();

                let rawModels = [];
                if (detectedProviderName === 'Google Gemini' || detectedProviderName === 'Cohere') {
                    rawModels = data.models || [];
                } else if (detectedProviderName === 'Replicate') {
                    rawModels = data.results || [];
                } else {
                    rawModels = data.data || data.models || [];
                }

                if (rawModels.length === 0) {
                    throw new Error(`No models returned from ${detectedProviderName}.`);
                }

                // Standardize models to a common format
                const formatted = rawModels.map(m => {
                    let id = m.id || m.name || m.model;
                    if (detectedProviderName === 'Google Gemini' && m.name) id = m.name.replace('models/', '');

                    return {
                        id: id,
                        providerName: detectedProviderName,
                        displayName: m.displayName || m.name || id,
                        description: m.description || (m.pricing && m.pricing.prompt ? `Prompt pricing: ${m.pricing.prompt}` : null),
                        inputTokenLimit: m.inputTokenLimit || m.context_length || m.context_window || m.top_provider?.context_length,
                        outputTokenLimit: m.outputTokenLimit || m.top_provider?.max_completion_tokens,
                        version: m.version || 'N/A'
                    };
                });

                // Sort models based on weight
                const sortedModels = formatted.sort((a, b) => {
                     const wA = getWeight(a.id);
                     const wB = getWeight(b.id);
                     return wB - wA; // Descending order
                });

                renderCards(sortedModels);
                setStatus(`${sortedModels.length} Models Identified via ${detectedProviderName}`, 'success');

            } catch (err) {
                if (err.message.includes('Failed to fetch') || err.message.includes('CORS')) {
                    setStatus(`${detectedProviderName} detected, but browser CORS blocked the request.`, 'error');
                } else {
                    setStatus(err.message, 'error');
                }
            } finally {
                setLoading(false);
            }
        });

        // Heuristic to sort best models to top
        function getWeight(name) {
            if (!name) return 10;
            const n = name.toLowerCase();
            // Gemini
            if (n.includes('1.5') && n.includes('pro')) return 100;
            if (n.includes('1.5') && n.includes('flash')) return 90;
            // OpenAI
            if (n.includes('gpt-4o')) return 100;
            if (n.includes('gpt-4-turbo')) return 90;
            if (n.includes('gpt-4')) return 80;
            if (n.includes('gpt-3.5')) return 70;
            // Anthropic
            if (n.includes('claude-3-5-sonnet') || n.includes('claude-3-opus')) return 100;
            if (n.includes('claude-3-sonnet') || n.includes('claude-3-haiku')) return 90;
            // Mistral / Groq / Other
            if (n.includes('large') || n.includes('mixtral') || n.includes('llama-3.1')) return 85;
            if (n.includes('embedding') || n.includes('embed')) return 50;
            return 10;
        }

        // --- THE LOGIC ENGINE ---
        // Determines "Best For" based on model ID keywords
        function getCapabilities(modelId) {
            const id = (modelId || '').toLowerCase();
            const tags = [];

            if (id.includes('flash') || id.includes('haiku') || id.includes('fast') || id.includes('8b')) {
                tags.push({ text: '⚡ High Speed', class: 'badge-flash' });
                tags.push({ text: '💰 Cost Effective', class: 'badge-flash' });
            } else if (id.includes('pro') || id.includes('opus') || id.includes('gpt-4') || id.includes('large') || id.includes('70b') || id.includes('405b')) {
                tags.push({ text: '🧠 Complex Reasoning', class: 'badge-pro' });
                tags.push({ text: '📝 Content Creation', class: 'badge-pro' });
            }

            if (id.includes('vision') || id.includes('gpt-4o') || id.includes('1.5') || id.includes('claude-3')) {
                tags.push({ text: '👁️ Multimodal', class: 'badge-vision' });
            }

            if (id.includes('embedding') || id.includes('embed') || id.includes('text-search') || id.includes('bge') || id.includes('nomic')) {
                tags.push({ text: '🔍 Semantic Search', class: 'badge-embed' });
                tags.push({ text: '🗂️ RAG', class: 'badge-embed' });
                tags.push({ text: '🔢 Vectorizing', class: 'badge-embed' });
            }

            if (id.includes('code') || id.includes('coder')) {
                tags.push({ text: '💻 Coding', class: 'badge-default' });
            }

            if (id.includes('aqa')) {
                tags.push({ text: '✅ Fact Checking', class: 'badge-default' });
            }

            if (id.includes('stable-diffusion') || id.includes('dall-e') || id.includes('midjourney') || id.includes('image')) {
                tags.push({ text: '🎨 Image Gen', class: 'badge-vision' });
            }

            if (id.includes('whisper') || id.includes('tts') || id.includes('voice') || id.includes('speech')) {
                tags.push({ text: '🔊 Audio', class: 'badge-vision' });
            }

            if (tags.length === 0) {
                tags.push({ text: '🤖 General Purpose', class: 'badge-default' });
            }

            return tags;
        }

        function renderCards(models) {
            models.forEach((model, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = `${index * 50}ms`;

                const id = model.id;
                const inputLimit = model.inputTokenLimit ? formatNumber(model.inputTokenLimit) : 'N/A';
                const outputLimit = model.outputTokenLimit ? formatNumber(model.outputTokenLimit) : 'N/A';
                
                // Get Use Cases
                const capabilities = getCapabilities(id);
                const badgesHTML = capabilities.map(tag => 
                    `<span class="badge ${tag.class}">${tag.text}</span>`
                ).join('');

                card.innerHTML = `
                    <div class="card-header">
                        <div class="model-display-name" style="display:flex; justify-content:space-between;">
                            ${model.displayName}
                            <span style="font-size:0.7rem; font-weight:400; color:var(--text-muted); padding:2px 6px; border-radius:4px; background:rgba(255,255,255,0.05);">${model.providerName}</span>
                        </div>
                        <div class="model-id-container">
                            <span class="model-id">${id}</span>
                            <button class="copy-btn" onclick="copyToClipboard('${id}', this)" title="Copy ID">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            </button>
                        </div>
                    </div>

                    <div class="use-case-container">
                        ${badgesHTML}
                    </div>

                    <div class="desc">${model.description || 'No system description provided.'}</div>
                    
                    <div class="stats">
                        <div class="stat-item">
                            <strong>${inputLimit}</strong>
                            Context
                        </div>
                        <div class="stat-item">
                            <strong>${outputLimit}</strong>
                            Output
                        </div>
                        <div class="stat-item">
                            <strong>${model.version}</strong>
                            Ver
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text);
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            setTimeout(() => { btn.innerHTML = originalHTML; }, 1500);
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1).replace('.0','') + 'M';
            if (num >= 1000) return (num / 1000).toFixed(0) + 'k';
            return num;
        }

        function setStatus(msg, type) {
            statusDiv.textContent = msg;
            statusDiv.className = type;
        }

        function setLoading(isLoading) {
            if (isLoading) {
                btnText.style.display = 'none';
                loader.style.display = 'block';
                fetchBtn.disabled = true;
                fetchBtn.style.cursor = 'wait';
            } else {
                btnText.style.display = 'block';
                loader.style.display = 'none';
                fetchBtn.disabled = false;
                fetchBtn.style.cursor = 'pointer';
                btnText.textContent = 'Fetch Again';
            }
        }

        function shakeInput() {
            const box = document.querySelector('.search-box');
            box.style.animation = 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both';
            setTimeout(() => { box.style.animation = ''; }, 500);
        }

        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes shake {
                10%, 90% { transform: translate3d(-1px, 0, 0); }
                20%, 80% { transform: translate3d(2px, 0, 0); }
                30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
                40%, 60% { transform: translate3d(4px, 0, 0); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
