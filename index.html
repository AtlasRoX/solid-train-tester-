<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini API Explorer V2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #030712;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --primary-glow: #3b82f6;
            --accent-glow: #8b5cf6;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --success: #10b981;
            --badge-bg: rgba(59, 130, 246, 0.1);
            --badge-text: #60a5fa;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Animated Background */
        .ambient-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
            animation: pulseLight 10s ease-in-out infinite alternate;
        }

        @keyframes pulseLight {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.1); }
        }

        .container {
            width: 90%;
            max-width: 1000px;
            padding: 4rem 1rem;
            z-index: 1;
        }

        /* Header Styling */
        header {
            text-align: center;
            margin-bottom: 3.5rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            text-shadow: 0 0 30px rgba(255,255,255,0.1);
        }

        p.subtitle {
            color: var(--text-muted);
            margin-top: 1rem;
            font-size: 1.1rem;
            font-weight: 300;
        }

        /* Input Area (Glassmorphism) */
        .search-box {
            position: relative;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 0.5rem;
            border-radius: 16px;
            display: flex;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            max-width: 700px;
            margin: 0 auto 3rem auto;
        }

        .search-box:focus-within {
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 30px -5px rgba(59, 130, 246, 0.3);
            transform: translateY(-2px);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.1rem;
            padding: 1rem 1.5rem;
            outline: none;
            font-family: 'JetBrains Mono', monospace;
        }

        input::placeholder { color: rgba(255,255,255,0.2); }

        button#fetchBtn {
            background: linear-gradient(135deg, var(--primary-glow), var(--accent-glow));
            color: white;
            border: none;
            padding: 0 2.5rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            white-space: nowrap;
        }

        button#fetchBtn:hover {
            opacity: 0.9;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
        }

        /* Card Styling */
        .card {
            background: rgba(20, 20, 30, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.5s ease-out forwards;
            opacity: 0;
            display: flex;
            flex-direction: column;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 100%);
            pointer-events: none;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(30, 30, 45, 0.8);
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        /* Card Content */
        .card-header {
            margin-bottom: 1rem;
        }

        .model-display-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .model-id-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .model-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--primary-glow);
        }

        .copy-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px;
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }
        
        .copy-btn:hover { color: white; }
        .copy-btn svg { width: 14px; height: 14px; }

        .desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        /* New Use Case Badges */
        .use-case-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }

        .badge {
            font-size: 0.75rem;
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        /* Badge Color Variations */
        .badge-flash { background: rgba(234, 179, 8, 0.15); color: #facc15; border: 1px solid rgba(234, 179, 8, 0.2); }
        .badge-pro { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.2); }
        .badge-vision { background: rgba(168, 85, 247, 0.15); color: #c084fc; border: 1px solid rgba(168, 85, 247, 0.2); }
        .badge-embed { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }
        .badge-default { background: rgba(148, 163, 184, 0.15); color: #cbd5e1; border: 1px solid rgba(148, 163, 184, 0.2); }

        /* Stats Row */
        .stats {
            display: flex;
            gap: 1rem;
            border-top: 1px solid var(--glass-border);
            padding-top: 1rem;
            margin-top: auto;
        }

        .stat-item {
            font-size: 0.75rem;
            color: var(--text-muted);
            flex: 1;
        }

        .stat-item strong {
            display: block;
            color: #fff;
            font-size: 0.9rem;
            margin-bottom: 2px;
        }

        /* Status Messages */
        #status {
            text-align: center;
            margin-bottom: 2rem;
            font-weight: 500;
            height: 24px;
        }
        .error { color: #ef4444; text-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }
        .success { color: var(--success); text-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }

        /* Loader */
        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
            margin: 0 auto;
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

    </style>
</head>
<body>

    <div class="ambient-light"></div>

    <div class="container">
        <header>
            <h1>Gemini Vision</h1>
            <p class="subtitle">Enter your API key to analyze available models & capabilities.</p>
        </header>

        <div class="search-box">
            <input type="password" id="apiKey" placeholder="Paste AIza... Key Here" autocomplete="off">
            <button id="fetchBtn">
                <span id="btnText">Analyze Models</span>
                <div class="loader" id="loader"></div>
            </button>
        </div>

        <div id="status"></div>
        <div class="grid" id="grid"></div>
    </div>

    <script>
        const fetchBtn = document.getElementById('fetchBtn');
        const apiKeyInput = document.getElementById('apiKey');
        const grid = document.getElementById('grid');
        const statusDiv = document.getElementById('status');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');

        fetchBtn.addEventListener('click', async () => {
            const key = apiKeyInput.value.trim();
            if (!key) {
                setStatus('Please enter a valid API Key', 'error');
                shakeInput();
                return;
            }

            setLoading(true);
            grid.innerHTML = '';
            setStatus('');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}&pageSize=100`);
                const data = await response.json();

                if (!response.ok) throw new Error(data.error?.message || 'Access Denied');
                if (!data.models) throw new Error('No models returned');

                // Sort: Gemini 1.5 models first, then Pro, then others
                const sortedModels = data.models.sort((a, b) => {
                     // Weight for "1.5" models (Newest)
                     const wA = getWeight(a.displayName);
                     const wB = getWeight(b.displayName);
                     return wB - wA; // Descending order
                });

                renderCards(sortedModels);
                setStatus(`${sortedModels.length} Models Identified`, 'success');

            } catch (err) {
                setStatus(err.message, 'error');
            } finally {
                setLoading(false);
            }
        });

        // Heuristic to sort best models to top
        function getWeight(name) {
            if (name.includes('1.5') && name.includes('Pro')) return 100;
            if (name.includes('1.5') && name.includes('Flash')) return 90;
            if (name.includes('1.0') && name.includes('Pro')) return 80;
            if (name.includes('Embedding')) return 50;
            return 10;
        }

        // --- THE LOGIC ENGINE ---
        // Determines "Best For" based on model ID keywords
        function getCapabilities(modelId) {
            const id = modelId.toLowerCase();
            const tags = [];

            if (id.includes('flash')) {
                tags.push({ text: '⚡ High Speed', class: 'badge-flash' });
                tags.push({ text: '💰 Cost Effective', class: 'badge-flash' });
                tags.push({ text: '🔄 High Volume', class: 'badge-flash' });
            } else if (id.includes('pro')) {
                tags.push({ text: '🧠 Complex Reasoning', class: 'badge-pro' });
                tags.push({ text: '📝 Content Creation', class: 'badge-pro' });
            }

            // Version 1.5 specific (Flash is also 1.5, but handled above mostly)
            if (id.includes('1.5')) {
                 if (!id.includes('flash')) tags.push({ text: '📚 1M+ Context', class: 'badge-pro' });
                 tags.push({ text: '👁️ Multimodal (Native)', class: 'badge-vision' });
            } else if (id.includes('vision')) {
                tags.push({ text: '📷 Image Analysis', class: 'badge-vision' });
                tags.push({ text: '🎥 Video', class: 'badge-vision' });
            }

            if (id.includes('embedding')) {
                tags.push({ text: '🔍 Semantic Search', class: 'badge-embed' });
                tags.push({ text: '🗂️ RAG', class: 'badge-embed' });
                tags.push({ text: '🔢 Vectorizing', class: 'badge-embed' });
            }

            if (id.includes('aqa')) {
                tags.push({ text: '✅ Fact Checking', class: 'badge-default' });
            }

            if (tags.length === 0) {
                tags.push({ text: '🤖 General Purpose', class: 'badge-default' });
            }

            return tags;
        }

        function renderCards(models) {
            models.forEach((model, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = `${index * 50}ms`;

                const id = model.name.replace('models/', '');
                const inputLimit = model.inputTokenLimit ? formatNumber(model.inputTokenLimit) : 'N/A';
                const outputLimit = model.outputTokenLimit ? formatNumber(model.outputTokenLimit) : 'N/A';
                
                // Get Use Cases
                const capabilities = getCapabilities(id);
                const badgesHTML = capabilities.map(tag => 
                    `<span class="badge ${tag.class}">${tag.text}</span>`
                ).join('');

                card.innerHTML = `
                    <div class="card-header">
                        <div class="model-display-name">${model.displayName}</div>
                        <div class="model-id-container">
                            <span class="model-id">${id}</span>
                            <button class="copy-btn" onclick="copyToClipboard('${id}', this)" title="Copy ID">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            </button>
                        </div>
                    </div>

                    <div class="use-case-container">
                        ${badgesHTML}
                    </div>

                    <div class="desc">${model.description || 'No system description provided.'}</div>
                    
                    <div class="stats">
                        <div class="stat-item">
                            <strong>${inputLimit}</strong>
                            Context
                        </div>
                        <div class="stat-item">
                            <strong>${outputLimit}</strong>
                            Output
                        </div>
                        <div class="stat-item">
                            <strong>${model.version}</strong>
                            Ver
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text);
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            setTimeout(() => { btn.innerHTML = originalHTML; }, 1500);
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1).replace('.0','') + 'M';
            if (num >= 1000) return (num / 1000).toFixed(0) + 'k';
            return num;
        }

        function setStatus(msg, type) {
            statusDiv.textContent = msg;
            statusDiv.className = type;
        }

        function setLoading(isLoading) {
            if (isLoading) {
                btnText.style.display = 'none';
                loader.style.display = 'block';
                fetchBtn.disabled = true;
                fetchBtn.style.cursor = 'wait';
            } else {
                btnText.style.display = 'block';
                loader.style.display = 'none';
                fetchBtn.disabled = false;
                fetchBtn.style.cursor = 'pointer';
                btnText.textContent = 'Fetch Again';
            }
        }

        function shakeInput() {
            const box = document.querySelector('.search-box');
            box.style.animation = 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both';
            setTimeout(() => { box.style.animation = ''; }, 500);
        }

        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes shake {
                10%, 90% { transform: translate3d(-1px, 0, 0); }
                20%, 80% { transform: translate3d(2px, 0, 0); }
                30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
                40%, 60% { transform: translate3d(4px, 0, 0); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
